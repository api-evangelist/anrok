apis:
  - aid: anrok:anrok-api
    name: Anrok API
    description: >
      The Anrok REST API enables real-time sales tax calculation, transaction management,
      exemption certificate handling, product tax category mapping, customer tax ID validation,
      and retrieval of sales tax filing information. All requests are HTTP POST with JSON bodies.
      Authentication uses Bearer token via the Authorization header. The API is versioned at 1.1
      and exposes an OpenAPI specification for client generation.
    humanURL: https://apidocs.anrok.com/
    baseURL: https://api.anrok.com
